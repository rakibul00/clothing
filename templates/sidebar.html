<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <style>
        .sidebar-active { 
            background: rgba(99, 102, 241, 0.1); 
            color: #818cf8; 
            border-left: 4px solid #6366f1; 
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transform: translateX(5px);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0b1120]">

<!-- 🔥 TOP BAR (Mobile only) -->
<div class="lg:hidden flex items-center justify-between p-4 bg-[#0F172A] border-b border-slate-800">
    <h1 class="text-white font-bold">InventoryPro</h1>
    
    <!-- 🍔 Button -->
    <button onclick="toggleSidebar()" class="text-white text-xl">
        <i class="fas fa-bars"></i>
    </button>
</div>

<!-- 🔥 SIDEBAR -->
<div id="sidebar"
     class="w-64 bg-[#0F172A] border-r border-slate-800 h-screen fixed left-0 top-0 p-6 flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-50">
    
    <div class="flex items-center justify-between mb-10 px-2">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center">
                <i class="fas fa-boxes-stacked text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-white">
                   <a href="{% url 'admin_dashboard' %}" 
           class="">
             InventoryPro
        </a>
            </h1>
        </div>

        <!-- ❌ Close button (mobile) -->
        <button onclick="toggleSidebar()" class="lg:hidden text-white">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <nav class="space-y-2 flex-1">
        
        <a href="{% url 'admin_dashboard' %}" 
           class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 {% if request.resolver_match.url_name == 'admin_dashboard' %}sidebar-active{% endif %}">
            <i class="fas fa-th-large w-5"></i> Dashboard
        </a>

        <a href="{% url 'product_list' %}" 
           class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 {% if request.resolver_match.url_name == 'product_list' %}sidebar-active{% endif %}">
            <i class="fas fa-shopping-bag w-5"></i> Products
        </a>

        <a href="{% url 'pos' %}" 
           class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 {% if request.resolver_match.url_name == 'pos' %}sidebar-active{% endif %}">
            <i class="fas fa-cash-register w-5"></i> Sales / POS
        </a>

        <a href="{% url 'branch_report' %}" 
           class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 {% if request.resolver_match.url_name == 'branch_report' %}sidebar-active{% endif %}">
            <i class="fas fa-chart-pie w-5"></i> Reports
        </a>

    </nav>
</div>

<!-- 🔥 OVERLAY -->
<div id="overlay" onclick="toggleSidebar()" 
     class="fixed inset-0 bg-black/50 hidden z-40 lg:hidden"></div>

<!-- 🔥 MAIN CONTENT -->
<div class="lg:ml-64 p-6">
    {% block content %}{% endblock %}
</div>

<!-- 🔥 SCRIPT -->
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    }
</script>

</body>
</html>
