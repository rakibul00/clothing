{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center mt-20">
<form method="POST" class="bg-white p-6 rounded shadow w-96">
    {% csrf_token %}
    <input name="username" placeholder="Username" class="w-full p-2 border mb-3">
    <input name="password" type="password" placeholder="Password" class="w-full p-2 border mb-3">

    <button class="bg-black text-white w-full p-2">Login</button>
</form>
</div>
{% endblock %}
