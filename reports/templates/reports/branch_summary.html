<div class="p-8 bg-[#0B1120] min-h-screen text-white">
    <h1 class="text-2xl font-bold mb-6">Branch-wise Performance</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for branch in reports %}
        <div class="p-6 rounded-2xl bg-slate-800 border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold text-indigo-400">{{ branch.name }}</h2>
            <p class="text-gray-400 text-sm mb-4">{{ branch.location }}</p>
            
            <div class="flex justify-between border-t border-gray-700 pt-4">
                <div>
                    <p class="text-xs text-gray-500 uppercase">Total Revenue</p>
                    <p class="text-lg font-bold text-emerald-400">৳{{ branch.total_revenue|default:0 }}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 uppercase">Orders</p>
                    <p class="text-lg font-bold">{{ branch.total_orders }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
